components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # AUTH
    RegisterBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RefreshBody:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    VerifyOtpBody:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: "^\\d{6}$"
          description: Six-digit verification code from email
      required:
        - email
        - code

    VerifyOtpResponse:
      type: object
      properties:
        message:
          type: string
        alreadyVerified:
          type: boolean
          description: Present when the account was already verified
      required:
        - message

    ResendVerificationBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    CustomerProfile:
      type: object
      properties:
        userId:
          type: integer
        email:
          type: string
        name:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        cityRegion:
          type: ["string", "null"]
        preferredCurrency:
          type: ["string", "null"]
          description: Explicit ISO 4217 override; null means use regional default only
        localityCurrency:
          type: string
          description: Inferred from country (when mappable) and otherwise Accept-Language
        effectiveDisplayCurrency:
          type: string
          description: preferredCurrency ?? localityCurrency — use for display amounts
        timezone:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        dashboardTheme:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    PatchCustomerProfileBody:
      type: object
      minProperties: 1
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 255
        country:
          type: string
          maxLength: 120
        cityRegion:
          type: string
          maxLength: 120
        preferredCurrency:
          description: ISO 4217 code, or null to clear override and use regional default
          oneOf:
            - type: "null"
            - type: string
              minLength: 3
              maxLength: 3
        timezone:
          type: string
          maxLength: 80

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - accessToken
        - refreshToken
        - user

    # USERS
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        isVerified:
          type: boolean
        dashboardTheme:
          type: ["string", "null"]
          description: Selected theme id; null means use portal default
        phone:
          type: ["string", "null"]
          description: Mobile or phone number (optional)
        profileImageUrl:
          type: ["string", "null"]
          description: Avatar image URL (HTTPS recommended)
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - isActive
        - createdAt
        - updatedAt

    PatchThemeBody:
      type: object
      properties:
        themeId:
          type: ["string", "null"]
          description: Theme id from catalog, or null to use portal default
      required:
        - themeId

    PatchProfileBody:
      type: object
      description: Partial update — omit fields you do not want to change
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
        phone:
          type: ["string", "null"]
          maxLength: 40
        profileImageUrl:
          type: ["string", "null"]
          maxLength: 2048

    DashboardThemeInfo:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        description: { type: string }

    DashboardThemeDefaultsResponse:
      type: object
      properties:
        defaults:

kind = "web"
previewPath = "/"
title = "FurniCore Management System"
version = "1.0.0"
id = "artifacts/furnicore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18706

[services.development]
run = "pnpm --filter @workspace/furnicore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/furnicore", "run", "build" ]
publicDir = "artifacts/furnicore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18706"
BASE_PATH = "/"
